goal: Implement a provider-neutral MeshKit/OCG on-chain agent wallet integration with maroo testnet as the demo adapter, delivering an iPad HermesChat to DailyMart flow where delegated spending limits are visible, signed MCP request anchoring is linked to OKRW payment or transfer execution, and DailyMart returns target-owned MeshKit receipts with confirmed, pending, failed, and policy-denied presentation states.
